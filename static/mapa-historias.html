<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Historias — Santa Fe de Antioquia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root {
      --crema:      #f0e6d3;
      --crema-dark: #e4d5bc;
      --tierra:     #3b1f0e;
      --cafe:       #5c2d0e;
      --dorado:     #c9943a;
      --texto:      #2a1505;
      --gris:       #9a856e;
      --blanco:     #fdf8f2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--crema);
      color: var(--texto);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      background: var(--cafe);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 4px 20px rgba(59,31,14,0.2);
      z-index: 10;
      position: relative;
    }

    #header-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--crema);
      text-align: center;
      flex: 1;
      line-height: 1.3;
    }

    #header-titulo span {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      font-style: italic;
      opacity: 0.75;
      font-family: 'Lora', serif;
    }

    .header-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(240,230,211,0.15);
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--crema);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      text-decoration: none;
    }

    .header-btn:hover { background: rgba(240,230,211,0.25); }

    #contenedor {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #mapa { flex: 1; }

    #panel {
      width: 320px;
      background: var(--blanco);
      border-left: 1px solid var(--crema-dark);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--crema-dark) transparent;
    }

    #panel::-webkit-scrollbar { width: 3px; }
    #panel::-webkit-scrollbar-thumb { background: var(--crema-dark); }

    .historia-card {
      background: var(--crema);
      border: 1px solid var(--crema-dark);
      border-radius: 16px;
      padding: 14px 16px;
      transition: all 0.2s ease;
      border-left: 4px solid var(--cafe);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .historia-card:hover {
      background: var(--crema-dark);
      box-shadow: 0 4px 16px rgba(59,31,14,0.08);
    }

    .historia-card.activa {
      background: var(--crema-dark);
      border-left-color: var(--dorado);
      box-shadow: 0 4px 20px rgba(59,31,14,0.12);
    }

    .historia-card.sin-ubicacion {
      opacity: 0.55;
      border-left-color: var(--crema-dark);
      cursor: default;
    }

    .card-numero {
      font-size: 0.72rem;
      color: var(--gris);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-numero.sin-ub::after { content: " · sin ubicar"; }

    .card-texto {
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--texto);
      cursor: pointer;
    }

    .btn-expandir {
      background: none;
      border: none;
      color: var(--dorado);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 2px 0;
      font-family: 'Lora', serif;
      text-align: left;
      transition: color 0.2s;
    }

    .btn-expandir:hover { color: var(--cafe); }

    .card-fecha {
      font-size: 0.75rem;
      color: var(--gris);
      font-style: italic;
    }

    /* Botón "Que Don Ezequiel la cuente" */
    .btn-contar {
      background: var(--cafe);
      color: var(--crema);
      border: none;
      border-radius: 50px;
      padding: 9px 16px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: 'Lora', serif;
      transition: all 0.2s;
      margin-top: 4px;
      align-self: flex-start;
    }

    .btn-contar:hover {
      background: var(--tierra);
      transform: translateY(-1px);
    }

    /* Popups Leaflet */
    .leaflet-popup-content-wrapper {
      background: var(--cafe) !important;
      color: var(--crema) !important;
      border-radius: 12px !important;
      box-shadow: 0 8px 32px rgba(59,31,14,0.25) !important;
      font-family: 'Lora', serif !important;
      border: none !important;
      max-width: 260px !important;
    }

    .leaflet-popup-tip { background: var(--cafe) !important; }

    .leaflet-popup-content {
      margin: 12px 16px !important;
      font-size: 0.88rem !important;
      line-height: 1.5 !important;
    }

    .popup-numero {
      font-size: 0.72rem;
      opacity: 0.7;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .popup-texto { color: var(--crema); }

    .leaflet-popup-close-button {
      color: var(--crema) !important;
      font-size: 18px !important;
    }
  </style>
</head>
<body>

  <div id="header">
    <a href="/static/index.html" class="header-btn" title="Volver">←</a>
    <div id="header-titulo">
      Historias del pueblo
      <span id="contador">Cargando...</span>
    </div>
    <div style="width:40px"></div>
  </div>

  <div id="contenedor">
    <div id="mapa"></div>
    <div id="panel">
      <p style="color:var(--gris);font-style:italic;font-size:0.9rem;text-align:center;padding:24px 0">
        Cargando historias...
      </p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const iconoMarcador = L.divIcon({
      className: "",
      html: `<svg width="32" height="40" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24S32 26 32 16C32 7.163 24.837 0 16 0z" fill="#5c2d0e"/>
        <circle cx="16" cy="16" r="7" fill="#f0e6d3"/>
      </svg>`,
      iconSize: [32, 40], iconAnchor: [16, 40], popupAnchor: [0, -42]
    });

    const iconoActivo = L.divIcon({
      className: "",
      html: `<svg width="36" height="46" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24S32 26 32 16C32 7.163 24.837 0 16 0z" fill="#c9943a"/>
        <circle cx="16" cy="16" r="7" fill="#fdf8f2"/>
      </svg>`,
      iconSize: [36, 46], iconAnchor: [18, 46], popupAnchor: [0, -48]
    });

    const mapa     = L.map("mapa").setView([6.5567, -75.8241], 15);
    const panel    = document.getElementById("panel");
    const contador = document.getElementById("contador");

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap"
    }).addTo(mapa);

    let cardActiva     = null;
    let marcadorActivo = null;

    async function cargarHistorias() {
      const r    = await fetch(window.location.origin + "/historias");
      const data = await r.json();
      const hs   = data.historias;

      const conUb = hs.filter(h => h.lat).length;
      contador.textContent = `${hs.length} historia${hs.length !== 1 ? "s" : ""} · ${conUb} ubicada${conUb !== 1 ? "s" : ""}`;

      panel.innerHTML = "";

      if (hs.length === 0) {
        panel.innerHTML = '<p style="color:var(--gris);font-style:italic;font-size:0.9rem;text-align:center;padding:24px 0">No hay historias guardadas aún.</p>';
        return;
      }

      hs.forEach(h => {
        const tieneUb = !!h.lat;
        const card    = document.createElement("div");
        card.className = "historia-card" + (tieneUb ? "" : " sin-ubicacion");

        const LIMITE   = 150;
        const esLarga  = h.texto.length > LIMITE;
        const resumen  = esLarga ? h.texto.slice(0, LIMITE) + "..." : h.texto;
        let expandido  = false;

        // Número
        const numEl = document.createElement("div");
        numEl.className = `card-numero${tieneUb ? "" : " sin-ub"}`;
        numEl.textContent = `Historia #${h.id}`;
        card.appendChild(numEl);

        // Texto
        const textoEl = document.createElement("div");
        textoEl.className = "card-texto";
        textoEl.textContent = resumen;
        card.appendChild(textoEl);

        // Botón expandir (solo si es larga)
        if (esLarga) {
          const btnExp = document.createElement("button");
          btnExp.className = "btn-expandir";
          btnExp.textContent = "Leer más ↓";
          btnExp.addEventListener("click", (e) => {
            e.stopPropagation();
            expandido = !expandido;
            textoEl.textContent = expandido ? h.texto : resumen;
            btnExp.textContent  = expandido ? "Leer menos ↑" : "Leer más ↓";
          });
          card.appendChild(btnExp);
        }

        // Fecha
        const fechaEl = document.createElement("div");
        fechaEl.className = "card-fecha";
        fechaEl.textContent = `${h.fecha} · ${h.hora}`;
        card.appendChild(fechaEl);

        // Botón "Que Don Ezequiel la cuente" (solo historias con guión)
        if (tieneUb) {
          const btnContar = document.createElement("button");
          btnContar.className = "btn-contar";
          btnContar.textContent = "🎙 Que Don Ezequiel la cuente";
          btnContar.addEventListener("click", (e) => {
            e.stopPropagation();
            window.location.href = `/static/index.html?historia=${h.id}`;
          });
          card.appendChild(btnContar);
        }

        // Marcador en el mapa
        if (tieneUb) {
          const m = L.marker([h.lat, h.lng], { icon: iconoMarcador }).addTo(mapa);

          const popupResumen = h.texto.length > 120 ? h.texto.slice(0, 120) + "..." : h.texto;
          m.bindPopup(`
            <div class="popup-numero">Historia #${h.id}</div>
            <div class="popup-texto">${popupResumen}</div>
          `);

          m.on("click", () => {
            activarCard(card, m);
            card.scrollIntoView({ behavior: "smooth", block: "center" });
          });

          card.addEventListener("click", () => {
            activarCard(card, m);
            mapa.flyTo([h.lat, h.lng], 17, { duration: 0.8 });
            m.openPopup();
          });
        }

        panel.appendChild(card);
      });
    }

    function activarCard(card, marcador) {
      if (cardActiva) cardActiva.classList.remove("activa");
      card.classList.add("activa");
      cardActiva = card;

      if (marcadorActivo) marcadorActivo.setIcon(iconoMarcador);
      if (marcador) { marcador.setIcon(iconoActivo); marcadorActivo = marcador; }
    }

    cargarHistorias();
  </script>
</body>
</html>
