<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cabina de Historias — Santa Fe de Antioquia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    :root {
      --crema:      #f0e6d3;
      --crema-dark: #e4d5bc;
      --tierra:     #3b1f0e;
      --cafe:       #5c2d0e;
      --cafe-mid:   #8b5a3a;
      --dorado:     #c9943a;
      --texto:      #2a1505;
      --gris:       #9a856e;
      --blanco:     #fdf8f2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--crema);
      color: var(--texto);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #header {
      background: var(--cafe);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 4px 20px rgba(59,31,14,0.2);
      z-index: 10;
      position: relative;
    }

    #header-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--crema);
      text-align: center;
      flex: 1;
      line-height: 1.3;
    }

    #header-titulo span {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      font-style: italic;
      opacity: 0.75;
      font-family: 'Lora', serif;
    }

    .header-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(240,230,211,0.15);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--crema);
      transition: background 0.2s;
    }

    .header-btn:hover { background: rgba(240,230,211,0.25); }

    #app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #lado-personaje {
      width: auto;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    #lado-personaje::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 40px;
      background: linear-gradient(to right, transparent, rgba(228,213,188,0.6));
      pointer-events: none;
    }

    #lado-personaje::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: radial-gradient(ellipse at 50% 100%, rgba(92,45,14,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .pose {
      position: relative;
      bottom: auto;
      left: auto;
      transform: none;
      height: 100%;
      width: auto;
      object-fit: contain;
      opacity: 0;
      filter: drop-shadow(0 12px 32px rgba(59,31,14,0.15));
      display: none;
    }

    .pose.activa { opacity: 1; display: block; }

    #lado-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 28px 24px 20px;
      gap: 16px;
      overflow: hidden;
      background: var(--crema);
    }

    #dialogo {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--crema-dark) transparent;
    }

    #dialogo::-webkit-scrollbar { width: 3px; }
    #dialogo::-webkit-scrollbar-thumb { background: var(--crema-dark); border-radius: 2px; }

    .burbuja {
      max-width: 90%;
      padding: 14px 18px;
      font-size: 1.05rem;
      line-height: 1.65;
      animation: aparecer 0.35s ease forwards;
      opacity: 0;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .burbuja.ezequiel {
      background: var(--cafe);
      color: var(--crema);
      border-radius: 4px 20px 20px 20px;
      align-self: flex-start;
      box-shadow: 0 2px 12px rgba(59,31,14,0.12);
    }

    .burbuja.visitante {
      background: var(--blanco);
      color: var(--texto);
      border: 1px solid var(--crema-dark);
      border-radius: 20px 20px 4px 20px;
      align-self: flex-end;
      font-style: italic;
      box-shadow: 0 2px 8px rgba(59,31,14,0.06);
    }

    .burbuja.sistema {
      background: transparent;
      color: var(--gris);
      font-size: 0.82rem;
      align-self: center;
      font-style: italic;
      text-align: center;
      padding: 4px 0;
    }

    .puntos {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      padding: 14px 20px;
      background: var(--cafe);
      border-radius: 4px 20px 20px 20px;
      align-self: flex-start;
      box-shadow: 0 2px 12px rgba(59,31,14,0.12);
    }

    .puntos span {
      width: 7px; height: 7px;
      background: var(--crema);
      border-radius: 50%;
      opacity: 0.4;
      animation: pulso 1.2s ease-in-out infinite;
    }

    .puntos span:nth-child(2) { animation-delay: 0.2s; }
    .puntos span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulso {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50%       { opacity: 0.9; transform: scale(1.1); }
    }

    #transcripcion-wrap {
      display: none;
      background: var(--blanco);
      border: 1px solid var(--crema-dark);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: var(--texto);
      font-style: italic;
      line-height: 1.6;
    }

    #seccion-mapa {
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    #seccion-mapa p {
      font-size: 0.85rem;
      color: var(--gris);
      font-style: italic;
    }

    #mapa {
      height: 200px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--crema-dark);
      box-shadow: 0 2px 12px rgba(59,31,14,0.08);
    }

    #botones-mapa {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    #controles {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #estado-texto {
      font-size: 0.85rem;
      color: var(--gris);
      font-style: italic;
      text-align: center;
      min-height: 18px;
    }

    #botones {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      padding: 13px 24px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #btn-grabar {
      background: var(--dorado);
      color: var(--tierra);
      display: none;
      flex: 1;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(92,45,14,0.25);
    }

    #btn-grabar:hover:not(:disabled) {
      background: var(--tierra);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(92,45,14,0.3);
    }

    #btn-detener {
      background: var(--crema-dark);
      color: var(--cafe);
      border: 1px solid rgba(92,45,14,0.2);
      display: none;
      flex: 1;
    }

    #btn-detener:hover:not(:disabled) { background: #d9c9ae; }

    #btn-pausa {
      background: transparent;
      color: var(--cafe);
      border: 1px solid rgba(92,45,14,0.3);
      font-size: 0.85rem;
      padding: 10px 18px;
    }

    #btn-pausa:hover { background: var(--crema-dark); }

    #btn-confirmar-ubicacion {
      background: var(--cafe);
      color: var(--crema);
      border-radius: 50px;
      display: none;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-family: 'Lora', serif;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btn-confirmar-ubicacion:hover { background: var(--tierra); }

    #btn-sin-ubicacion {
      background: transparent;
      color: var(--gris);
      border: 1px solid rgba(154,133,110,0.4);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 0.85rem;
      font-family: 'Lora', serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btn-sin-ubicacion:hover {
      border-color: var(--cafe-mid);
      color: var(--cafe-mid);
    }

    #btn-no-tengo {
      background: transparent;
      color: var(--gris);
      border: 1px solid rgba(154,133,110,0.4);
      font-size: 0.85rem;
    }

    #btn-no-tengo:hover { border-color: var(--cafe-mid); color: var(--cafe-mid); }

    #btn-mapa {
      background: transparent;
      color: var(--gris);
      border: 1px solid rgba(154,133,110,0.4);
      font-size: 0.82rem;
      padding: 10px 16px;
      border-radius: 50px;
    }

    #btn-mapa:hover { border-color: var(--cafe); color: var(--cafe); }

    /* ── Overlay mapa general ── */
    #overlay-mapa {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      flex-direction: column;
      background: var(--crema);
    }

    #overlay-mapa.visible { display: flex; }

    #overlay-header {
      background: var(--cafe);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 4px 20px rgba(59,31,14,0.2);
      z-index: 10;
    }

    #overlay-header-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--crema);
      text-align: center;
      flex: 1;
      line-height: 1.3;
    }

    #overlay-header-titulo span {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      font-style: italic;
      opacity: 0.75;
      font-family: 'Lora', serif;
    }

    #overlay-contenedor {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #mapa-overlay { flex: 1; }

    #panel-overlay {
      width: 320px;
      background: var(--blanco);
      border-left: 1px solid var(--crema-dark);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--crema-dark) transparent;
    }

    #panel-overlay::-webkit-scrollbar { width: 3px; }
    #panel-overlay::-webkit-scrollbar-thumb { background: var(--crema-dark); }

    /* Tarjetas compartidas entre overlay y sección mapa */
    .historia-card {
      background: var(--crema);
      border: 1px solid var(--crema-dark);
      border-radius: 16px;
      padding: 14px 16px;
      transition: all 0.2s ease;
      border-left: 4px solid var(--cafe);
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
    }

    .historia-card:hover {
      background: var(--crema-dark);
      box-shadow: 0 4px 16px rgba(59,31,14,0.08);
    }

    .historia-card.activa {
      background: var(--crema-dark);
      border-left-color: var(--dorado);
      box-shadow: 0 4px 20px rgba(59,31,14,0.12);
    }

    .historia-card.sin-ubicacion {
      opacity: 0.55;
      border-left-color: var(--crema-dark);
    }

    .card-numero {
      font-size: 0.72rem;
      color: var(--gris);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-numero.sin-ub::after { content: " · sin ubicar"; }

    .card-texto {
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--texto);
    }

    .btn-expandir {
      background: none;
      border: none;
      color: var(--dorado);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 2px 0;
      font-family: 'Lora', serif;
      text-align: left;
    }

    .btn-expandir:hover { color: var(--cafe); }

    .card-fecha {
      font-size: 0.75rem;
      color: var(--gris);
      font-style: italic;
    }

    .btn-contar {
      background: var(--cafe);
      color: var(--crema);
      border: none;
      border-radius: 50px;
      padding: 9px 16px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: 'Lora', serif;
      transition: all 0.2s;
      margin-top: 4px;
      align-self: flex-start;
    }

    .btn-contar:hover { background: var(--tierra); }

    /* Popups Leaflet */
    .leaflet-popup-content-wrapper {
      background: var(--cafe) !important;
      color: var(--crema) !important;
      border-radius: 12px !important;
      box-shadow: 0 8px 32px rgba(59,31,14,0.25) !important;
      font-family: 'Lora', serif !important;
      border: none !important;
      max-width: 260px !important;
    }

    .leaflet-popup-tip { background: var(--cafe) !important; }

    .leaflet-popup-content {
      margin: 12px 16px !important;
      font-size: 0.88rem !important;
      line-height: 1.5 !important;
    }

    .popup-numero {
      font-size: 0.72rem;
      opacity: 0.7;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .popup-texto { color: var(--crema); }

    .leaflet-popup-close-button {
      color: var(--crema) !important;
      font-size: 18px !important;
    }
  </style>
</head>
<body>

  <div id="header">
    <div id="header-titulo">
      Relaticos
      <span>de Santa Fe de Antioquia</span>
    </div>
  </div>

  <div id="app">

    <div id="lado-personaje">
      <img class="pose activa" id="pose-idle"     src="img/idle.png"     alt="Don Ezequiel">
      <img class="pose"        id="pose-hablando" src="img/hablando.png" alt="Don Ezequiel hablando">
      <img class="pose"        id="pose-secreto"  src="img/secreto.png"  alt="Don Ezequiel secreto">
      <img class="pose"        id="pose-mano"     src="img/mano.png"     alt="Don Ezequiel mano">
      <img class="pose"        id="pose-tomando"  src="img/tomando.png"  alt="Don Ezequiel tomando">
    </div>

    <div id="lado-panel">
      <div id="dialogo"></div>
      <div id="transcripcion-wrap"></div>

      <div id="seccion-mapa">
        <p>¿Dónde ocurrió esta historia? Toca el mapa para marcar el lugar.</p>
        <div id="mapa"></div>
        <div id="botones-mapa">
          <button id="btn-confirmar-ubicacion">📍 Confirmar lugar</button>
          <button id="btn-sin-ubicacion">No sé dónde ocurrió</button>
        </div>
      </div>

      <div id="controles">
        <div id="estado-texto"></div>
        <div id="botones">
          <button class="btn" id="btn-grabar">🎙 Contar mi historia</button>
          <button class="btn" id="btn-no-tengo" style="display:none;">No tengo una historia</button>
          <button class="btn" id="btn-detener">⏹ Terminar</button>
          <button class="btn" id="btn-pausa" style="display:none;">⏸ Pausar</button>
          <button class="btn" id="btn-mapa">🗺 Ver historias</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Overlay mapa general ── -->
  <div id="overlay-mapa">
    <div id="overlay-header">
      <button class="header-btn" id="btn-cerrar-mapa">←</button>
      <div id="overlay-header-titulo">
        Historias del pueblo
        <span id="overlay-contador">Cargando...</span>
      </div>
      <div style="width:40px"></div>
    </div>
    <div id="overlay-contenedor">
      <div id="mapa-overlay"></div>
      <div id="panel-overlay"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const btnNoTengo        = document.getElementById("btn-no-tengo");
    const dialogo           = document.getElementById("dialogo");
    const estadoTexto       = document.getElementById("estado-texto");
    const btnGrabar         = document.getElementById("btn-grabar");
    const btnDetener        = document.getElementById("btn-detener");
    const btnPausa          = document.getElementById("btn-pausa");
    const btnConfirmar      = document.getElementById("btn-confirmar-ubicacion");
    const btnSinUbicacion   = document.getElementById("btn-sin-ubicacion");
    const seccionMapa       = document.getElementById("seccion-mapa");
    const transcripcionWrap = document.getElementById("transcripcion-wrap");
    const overlayMapa       = document.getElementById("overlay-mapa");
    const panelOverlay      = document.getElementById("panel-overlay");
    const overlayContador   = document.getElementById("overlay-contador");

    const poses = {
      idle:     document.getElementById("pose-idle"),
      hablando: document.getElementById("pose-hablando"),
      secreto:  document.getElementById("pose-secreto"),
      mano:     document.getElementById("pose-mano"),
      tomando:  document.getElementById("pose-tomando"),
    };

    let poseActual     = "idle";
    let mediaRecorder  = null;
    let chunks         = [];
    let historiaId     = null;
    let mapa           = null;
    let marcador       = null;
    let coordElegida   = null;
    let audioActual    = null;
    let pausado        = false;
    let frasesActuales = null;

    // Iconos marcadores
    const iconoMarcador = L.divIcon({
      className: "",
      html: `<svg width="32" height="40" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24S32 26 32 16C32 7.163 24.837 0 16 0z" fill="#5c2d0e"/>
        <circle cx="16" cy="16" r="7" fill="#f0e6d3"/>
      </svg>`,
      iconSize: [32, 40], iconAnchor: [16, 40], popupAnchor: [0, -40]
    });

    const iconoMarcadorOverlay = L.divIcon({
      className: "",
      html: `<svg width="32" height="40" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24S32 26 32 16C32 7.163 24.837 0 16 0z" fill="#5c2d0e"/>
        <circle cx="16" cy="16" r="7" fill="#f0e6d3"/>
      </svg>`,
      iconSize: [32, 40], iconAnchor: [16, 40], popupAnchor: [0, -42]
    });

    const iconoActivoOverlay = L.divIcon({
      className: "",
      html: `<svg width="36" height="46" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24S32 26 32 16C32 7.163 24.837 0 16 0z" fill="#c9943a"/>
        <circle cx="16" cy="16" r="7" fill="#fdf8f2"/>
      </svg>`,
      iconSize: [36, 46], iconAnchor: [18, 46], popupAnchor: [0, -48]
    });

    // ── Poses ────────────────────────────────────────────────────────────────
    function setPose(nombre) {
      if (poseActual === nombre) return;
      poses[poseActual].classList.remove("activa");
      (poses[nombre] || poses["idle"]).classList.add("activa");
      poseActual = nombre;
    }

    // ── Diálogo ──────────────────────────────────────────────────────────────
    function agregarBurbuja(texto, tipo = "ezequiel") {
      const div = document.createElement("div");
      div.className = `burbuja ${tipo}`;
      div.textContent = texto;
      dialogo.appendChild(div);
      dialogo.scrollTop = dialogo.scrollHeight;
      return div;
    }

    function mostrarPuntos() {
      const div = document.createElement("div");
      div.className = "puntos";
      div.id = "puntos-cargando";
      div.innerHTML = "<span></span><span></span><span></span>";
      dialogo.appendChild(div);
      dialogo.scrollTop = dialogo.scrollHeight;
    }

    function quitarPuntos() {
      const p = document.getElementById("puntos-cargando");
      if (p) p.remove();
    }

    // ── TTS ──────────────────────────────────────────────────────────────────
    async function hablar(texto, pose) {
      setPose(pose);
      try {
        const r = await fetch("/tts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ texto })
        });
        if (!r.ok) throw new Error(`TTS error ${r.status}`);
        const blob  = await r.blob();
        const url   = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio._url  = url;
        return audio;
      } catch(e) {
        console.error("Error en hablar():", e, "| texto:", texto);
        throw e;
      }
    }

    async function reproducir(audio) {
      if (audioActual) { audioActual.pause(); audioActual = null; }
      audioActual = audio;
      pausado = false;
      btnPausa.style.display = "inline-block";
      btnPausa.textContent   = "⏸ Pausar";
      ducking(true);
      audio.play();
      await new Promise(r => {
        audio.onended = () => {
          URL.revokeObjectURL(audio._url);
          btnPausa.style.display = "none";
          pausado = false;
          ducking(false);
          r();
        };
      });
    }

    // ── Narrar guión ─────────────────────────────────────────────────────────
    async function narrarGuion(guion) {
      for (const parrafo of guion.parrafos) {
        const pose = parrafo.pose === "saludo" ? "idle" : parrafo.pose;
        mostrarPuntos();
        const audio = await hablar(parrafo.texto, pose);
        quitarPuntos();
        agregarBurbuja(parrafo.texto, "ezequiel");
        await reproducir(audio);
      }
      setPose("idle");
      estadoTexto.textContent  = "";
      btnGrabar.style.display  = "inline-block";
      btnNoTengo.style.display = "inline-block";
    }

    // ── Despedida ─────────────────────────────────────────────────────────────
    async function ejecutarDespedida(frases) {
      mostrarPuntos();
      const audioDespedida = await hablar(frases.despedida, "mano");
      quitarPuntos();
      agregarBurbuja(frases.despedida, "ezequiel");
      await reproducir(audioDespedida);

      setPose("idle");

      const btnVerMapa = document.createElement("button");
      btnVerMapa.className = "btn";
      btnVerMapa.textContent = "🗺 Ver todas las historias";
      btnVerMapa.style.cssText = "background:var(--cafe);color:var(--crema);border:none;cursor:pointer;margin-top:4px;";
      btnVerMapa.onclick = () => abrirMapaOverlay();
      dialogo.appendChild(btnVerMapa);
      dialogo.scrollTop = dialogo.scrollHeight;

      btnGrabar.style.display = "inline-block";
    }

    // ── Audio ambiente ────────────────────────────────────────────────────────
    const audioAmbiente = new Audio("/static/audio/ambiente.mp3");
    audioAmbiente.loop   = true;
    audioAmbiente.volume = 0.2;

    const tracksMusica = [
      new Audio("/static/audio/musica1.mp3"),
      new Audio("/static/audio/musica2.mp3"),
    ];
    let trackActualIdx = Math.random() < 0.5 ? 0 : 1;
    let volumenMusica  = 0.12;

    tracksMusica.forEach(t => { t.volume = volumenMusica; });
    tracksMusica[0].onended = () => { trackActualIdx = 1; tracksMusica[1].play(); };
    tracksMusica[1].onended = () => { trackActualIdx = 0; tracksMusica[0].play(); };

    function iniciarAmbiente() {
      audioAmbiente.play().catch(() => {});
      tracksMusica[trackActualIdx].play().catch(() => {});
    }

    function musicaActual() {
      return tracksMusica[trackActualIdx];
    }

    function ducking(activar) {
      const volAmbiente = activar ? 0.11 : 0.17;
      const volMusica   = activar ? 0.02 : 0.10;
      volumenMusica     = volMusica;

      const pasos = 20, intervalo = 50;
      let paso = 0;
      const volActualAmbiente = audioAmbiente.volume;
      const volActualMusica   = musicaActual().volume;
      const diffAmbiente = volAmbiente - volActualAmbiente;
      const diffMusica   = volMusica   - volActualMusica;

      const fade = setInterval(() => {
        paso++;
        audioAmbiente.volume = Math.max(0, Math.min(1,
          volActualAmbiente + (diffAmbiente * paso / pasos)
        ));
        musicaActual().volume = Math.max(0, Math.min(1,
          volActualMusica + (diffMusica * paso / pasos)
        ));
        if (paso >= pasos) clearInterval(fade);
      }, intervalo);
    }

    // ── Pausa ────────────────────────────────────────────────────────────────
    btnPausa.addEventListener("click", () => {
      if (!audioActual) return;
      if (pausado) {
        audioActual.play();
        audioAmbiente.play().catch(() => {});
        musicaActual().play().catch(() => {});
        pausado = false;
        btnPausa.textContent = "⏸ Pausar";
      } else {
        audioActual.pause();
        audioAmbiente.pause();
        musicaActual().pause();
        pausado = true;
        btnPausa.textContent = "▶ Reanudar";
      }
    });

    // ── Arranque ─────────────────────────────────────────────────────────────
    async function arrancar() {
      const params    = new URLSearchParams(window.location.search);
      const idElegido = params.get("historia");

      iniciarAmbiente();
      estadoTexto.textContent = "Don Ezequiel está recordando una historia...";
      mostrarPuntos();

      try {
        const url  = idElegido ? `/guion/${idElegido}` : "/historia-aleatoria";
        const r    = await fetch(url);
        const data = await r.json();
        quitarPuntos();
        estadoTexto.textContent = "";

        if (data.error) {
          const texto = "Buenas tardes tenga usted. Aún no tengo historias que contarle, pero puede ser el primero en compartir una.";
          agregarBurbuja(texto, "ezequiel");
          const audio = await hablar(texto, "idle");
          await reproducir(audio);
          setPose("idle");
          btnGrabar.style.display  = "inline-block";
          btnNoTengo.style.display = "inline-block";
          return;
        }

        await narrarGuion(data);

      } catch(e) {
        quitarPuntos();
        agregarBurbuja("(No se pudo conectar con el servidor)", "sistema");
        estadoTexto.textContent = "";
      }
    }

    // ── No tengo historia ────────────────────────────────────────────────────
    btnNoTengo.addEventListener("click", async () => {
      btnNoTengo.style.display = "none";
      btnGrabar.style.display  = "none";

      const texto = "Vea pues, no importa. Ya con que me haya escuchado es suficiente. Si le provoca, puede echarle un ojo al mapa con las historias que otros han dejado por aquí.";
      mostrarPuntos();
      const audio = await hablar(texto, "mano");
      quitarPuntos();
      agregarBurbuja(texto, "ezequiel");
      await reproducir(audio);

      setPose("idle");

      const btnVerMapa = document.createElement("button");
      btnVerMapa.className = "btn";
      btnVerMapa.textContent = "🗺 Ver todas las historias";
      btnVerMapa.style.cssText = "background:var(--cafe);color:var(--crema);border:none;cursor:pointer;";
      btnVerMapa.onclick = () => abrirMapaOverlay();
      dialogo.appendChild(btnVerMapa);
      dialogo.scrollTop = dialogo.scrollHeight;
    });

    // ── Grabar ───────────────────────────────────────────────────────────────
    btnGrabar.addEventListener("click", async () => {
      chunks = [];
      seccionMapa.style.display       = "none";
      transcripcionWrap.style.display = "none";
      btnNoTengo.style.display        = "none";

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch(e) {
        estadoTexto.textContent = "❌ No se pudo acceder al micrófono.";
        return;
      }

      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        await procesarAudio();
      };

      mediaRecorder.start();
      setPose("idle");
      estadoTexto.textContent      = "🔴 Escuchando...";
      btnGrabar.style.display      = "none";
      btnDetener.style.display     = "inline-block";
      agregarBurbuja("(El visitante está contando una historia...)", "sistema");
    });

    // ── Detener ──────────────────────────────────────────────────────────────
    btnDetener.addEventListener("click", () => {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        estadoTexto.textContent  = "⏳ Transcribiendo...";
        btnDetener.style.display = "none";
      }
    });

    // ── Procesar audio ────────────────────────────────────────────────────────
    async function procesarAudio() {
      const blob = new Blob(chunks, { type: "audio/webm" });
      const fd   = new FormData();
      fd.append("audio", blob, "historia.webm");

      try {
        const r1   = await fetch("/transcribir", { method: "POST", body: fd });
        const data = await r1.json();

        if (data.error) {
          estadoTexto.textContent = "❌ Error al transcribir.";
          btnGrabar.style.display  = "inline-block";
          btnNoTengo.style.display = "inline-block";
          return;
        }

        historiaId = data.numero;
        transcripcionWrap.style.display = "block";
        transcripcionWrap.textContent   = data.texto;
        agregarBurbuja(data.texto, "visitante");

        estadoTexto.textContent = "Don Ezequiel está escuchando...";
        setPose("tomando");
        await new Promise(r => setTimeout(r, 2000));
        estadoTexto.textContent = "";
        setPose("idle");

        // Don Ezequiel agradece
        const rg      = await fetch("/gracias", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ texto: data.texto })
        });
        const gracias = await rg.json();

        mostrarPuntos();
        const audioGracias = await hablar(gracias.texto, "mano");
        quitarPuntos();
        agregarBurbuja(gracias.texto, "ezequiel");
        await reproducir(audioGracias);

        // Frases de transición
        const rf     = await fetch("/frases-transicion");
        const frases = await rf.json();
        frasesActuales = frases;

        mostrarPuntos();
        const audioTransicion = await hablar(frases.transicion, "mano");
        quitarPuntos();
        agregarBurbuja(frases.transicion, "ezequiel");
        await reproducir(audioTransicion);

        setPose("idle");
        mostrarMapaUbicacion();

        btnConfirmar.onclick = async () => {
          if (!coordElegida || !historiaId) return;
          await fetch("/ubicar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: historiaId, lat: coordElegida.lat, lng: coordElegida.lng })
          });
          seccionMapa.style.display = "none";
          agregarBurbuja("(Historia ubicada en el mapa ✓)", "sistema");
          await ejecutarDespedida(frasesActuales);
        };

      } catch(e) {
        console.error("Error completo:", e);
        estadoTexto.textContent  = "❌ No se pudo conectar.";
        btnGrabar.style.display  = "inline-block";
        btnNoTengo.style.display = "inline-block";
      }
    }

    // ── Mapa de ubicación ────────────────────────────────────────────────────
    function mostrarMapaUbicacion() {
      seccionMapa.style.display  = "flex";
      btnConfirmar.style.display = "none";
      coordElegida               = null;

      if (!mapa) {
        mapa = L.map("mapa").setView([6.5567, -75.8241], 15);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap"
        }).addTo(mapa);
        mapa.on("click", (e) => {
          coordElegida = { lat: e.latlng.lat, lng: e.latlng.lng };
          if (marcador) { marcador.setLatLng(e.latlng); }
          else { marcador = L.marker(e.latlng, { icon: iconoMarcador }).addTo(mapa); }
          btnConfirmar.style.display = "inline-block";
        });
      } else {
        mapa.setView([6.5567, -75.8241], 15);
        if (marcador) { mapa.removeLayer(marcador); marcador = null; }
        setTimeout(() => mapa.invalidateSize(), 100);
      }
    }

    // ── Sin ubicación ────────────────────────────────────────────────────────
    btnSinUbicacion.addEventListener("click", async () => {
      seccionMapa.style.display = "none";
      agregarBurbuja("(Historia sin ubicación definida)", "sistema");
      if (frasesActuales) await ejecutarDespedida(frasesActuales);
    });

    // ── Overlay mapa general ──────────────────────────────────────────────────
    let mapaOverlay           = null;
    let cardActivaOverlay     = null;
    let marcadorActivoOverlay = null;

    async function abrirMapaOverlay() {
      overlayMapa.classList.add("visible");

      if (!mapaOverlay) {
        mapaOverlay = L.map("mapa-overlay").setView([6.5567, -75.8241], 15);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap"
        }).addTo(mapaOverlay);
      }

      setTimeout(() => mapaOverlay.invalidateSize(), 100);

      const r    = await fetch("/historias");
      const data = await r.json();
      const hs   = data.historias;

      const conUb = hs.filter(h => h.lat).length;
      overlayContador.textContent = `${hs.length} historia${hs.length !== 1 ? "s" : ""} · ${conUb} ubicada${conUb !== 1 ? "s" : ""}`;

      panelOverlay.innerHTML = "";
      cardActivaOverlay      = null;

      // Limpia marcadores anteriores
      mapaOverlay.eachLayer(l => { if (l instanceof L.Marker) mapaOverlay.removeLayer(l); });

      hs.forEach(h => {
        const tieneUb = !!h.lat;
        const card    = document.createElement("div");
        card.className = "historia-card" + (tieneUb ? "" : " sin-ubicacion");

        const LIMITE  = 150;
        const esLarga = h.texto.length > LIMITE;
        const resumen = esLarga ? h.texto.slice(0, LIMITE) + "..." : h.texto;
        let expandido = false;

        const numEl = document.createElement("div");
        numEl.className = `card-numero${tieneUb ? "" : " sin-ub"}`;
        numEl.textContent = `Historia #${h.id}`;
        card.appendChild(numEl);

        const textoEl = document.createElement("div");
        textoEl.className = "card-texto";
        textoEl.textContent = resumen;
        card.appendChild(textoEl);

        if (esLarga) {
          const btnExp = document.createElement("button");
          btnExp.className = "btn-expandir";
          btnExp.textContent = "Leer más ↓";
          btnExp.addEventListener("click", (e) => {
            e.stopPropagation();
            expandido = !expandido;
            textoEl.textContent = expandido ? h.texto : resumen;
            btnExp.textContent  = expandido ? "Leer menos ↑" : "Leer más ↓";
          });
          card.appendChild(btnExp);
        }

        const fechaEl = document.createElement("div");
        fechaEl.className = "card-fecha";
        fechaEl.textContent = `${h.fecha} · ${h.hora}`;
        card.appendChild(fechaEl);

        // Botón que cierra el overlay y pide a Don Ezequiel que la cuente
        const btnContar = document.createElement("button");
        btnContar.className = "btn-contar";
        btnContar.textContent = "🎙 Que Don Ezequiel la cuente";
        btnContar.addEventListener("click", (e) => {
          e.stopPropagation();
          cerrarMapaOverlay();
          dialogo.innerHTML = "";
          fetch(`/guion/${h.id}`)
            .then(r => r.json())
            .then(guion => narrarGuion(guion));
        });
        card.appendChild(btnContar);

        if (tieneUb) {
          const m = L.marker([h.lat, h.lng], { icon: iconoMarcadorOverlay }).addTo(mapaOverlay);
          const popupResumen = h.texto.length > 120 ? h.texto.slice(0, 120) + "..." : h.texto;
          m.bindPopup(`
            <div class="popup-numero">Historia #${h.id}</div>
            <div class="popup-texto">${popupResumen}</div>
          `);
          m.on("click", () => {
            activarCardOverlay(card, m);
            card.scrollIntoView({ behavior: "smooth", block: "center" });
          });
          card.addEventListener("click", () => {
            activarCardOverlay(card, m);
            mapaOverlay.flyTo([h.lat, h.lng], 17, { duration: 0.8 });
            m.openPopup();
          });
        }

        panelOverlay.appendChild(card);
      });
    }

    function cerrarMapaOverlay() {
      overlayMapa.classList.remove("visible");
    }

    function activarCardOverlay(card, marcador) {
      if (cardActivaOverlay) cardActivaOverlay.classList.remove("activa");
      card.classList.add("activa");
      cardActivaOverlay = card;
      if (marcadorActivoOverlay) marcadorActivoOverlay.setIcon(iconoMarcadorOverlay);
      if (marcador) { marcador.setIcon(iconoActivoOverlay); marcadorActivoOverlay = marcador; }
    }

    document.getElementById("btn-mapa").addEventListener("click", abrirMapaOverlay);
    document.getElementById("btn-cerrar-mapa").addEventListener("click", cerrarMapaOverlay);

    arrancar();
  </script>
</body>
</html>
