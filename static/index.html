<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cabina de Historias — Santa Fe de Antioquia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    :root {
      --crema:      #f0e6d3;
      --crema-dark: #e4d5bc;
      --tierra:     #3b1f0e;
      --cafe:       #5c2d0e;
      --cafe-mid:   #8b5a3a;
      --dorado:     #c9943a;
      --texto:      #2a1505;
      --gris:       #9a856e;
      --blanco:     #fdf8f2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--crema);
      color: var(--texto);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #header {
      background: var(--cafe);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 4px 20px rgba(59,31,14,0.2);
      z-index: 10;
      position: relative;
    }

    #header-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--crema);
      text-align: center;
      flex: 1;
      line-height: 1.3;
    }

    #header-titulo span {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      font-style: italic;
      opacity: 0.75;
      font-family: 'Lora', serif;
    }

    .header-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(240,230,211,0.15);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--crema);
      transition: background 0.2s;
    }

    .header-btn:hover { background: rgba(240,230,211,0.25); }

    #app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #lado-personaje {
      width: 36%;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(to bottom, var(--crema) 0%, var(--crema-dark) 100%);
    }

    #lado-personaje::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 40px;
      background: linear-gradient(to right, transparent, rgba(228,213,188,0.6));
      pointer-events: none;
    }

    #lado-personaje::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: radial-gradient(ellipse at 50% 100%, rgba(92,45,14,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .pose {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 90vh;
      width: auto;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.45s ease;
      filter: drop-shadow(0 12px 32px rgba(59,31,14,0.15));
    }

    .pose.activa { opacity: 1; }

    #lado-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 28px 24px 20px;
      gap: 16px;
      overflow: hidden;
      background: var(--crema);
    }

    #dialogo {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--crema-dark) transparent;
    }

    #dialogo::-webkit-scrollbar { width: 3px; }
    #dialogo::-webkit-scrollbar-thumb { background: var(--crema-dark); border-radius: 2px; }

    .burbuja {
      max-width: 90%;
      padding: 14px 18px;
      font-size: 1.05rem;
      line-height: 1.65;
      animation: aparecer 0.35s ease forwards;
      opacity: 0;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .burbuja.ezequiel {
      background: var(--cafe);
      color: var(--crema);
      border-radius: 4px 20px 20px 20px;
      align-self: flex-start;
      box-shadow: 0 2px 12px rgba(59,31,14,0.12);
    }

    .burbuja.visitante {
      background: var(--blanco);
      color: var(--texto);
      border: 1px solid var(--crema-dark);
      border-radius: 20px 20px 4px 20px;
      align-self: flex-end;
      font-style: italic;
      box-shadow: 0 2px 8px rgba(59,31,14,0.06);
    }

    .burbuja.sistema {
      background: transparent;
      color: var(--gris);
      font-size: 0.82rem;
      align-self: center;
      font-style: italic;
      text-align: center;
      padding: 4px 0;
    }

    .puntos {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      padding: 14px 20px;
      background: var(--cafe);
      border-radius: 4px 20px 20px 20px;
      align-self: flex-start;
      box-shadow: 0 2px 12px rgba(59,31,14,0.12);
    }

    .puntos span {
      width: 7px; height: 7px;
      background: var(--crema);
      border-radius: 50%;
      opacity: 0.4;
      animation: pulso 1.2s ease-in-out infinite;
    }

    .puntos span:nth-child(2) { animation-delay: 0.2s; }
    .puntos span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulso {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50%       { opacity: 0.9; transform: scale(1.1); }
    }

    #transcripcion-wrap {
      display: none;
      background: var(--blanco);
      border: 1px solid var(--crema-dark);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: var(--texto);
      font-style: italic;
      line-height: 1.6;
    }

    #seccion-mapa {
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    #seccion-mapa p {
      font-size: 0.85rem;
      color: var(--gris);
      font-style: italic;
    }

    #mapa {
      height: 200px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--crema-dark);
      box-shadow: 0 2px 12px rgba(59,31,14,0.08);
    }

    /* Botones del mapa */
    #botones-mapa {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    #controles {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #estado-texto {
      font-size: 0.85rem;
      color: var(--gris);
      font-style: italic;
      text-align: center;
      min-height: 18px;
    }

    #botones {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      padding: 13px 24px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #btn-grabar {
      background: var(--dorado);
      color: var(--tierra);
      display: none;
      flex: 1;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(92,45,14,0.25);
    }

    #btn-grabar:hover:not(:disabled) {
      background: var(--tierra);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(92,45,14,0.3);
    }

    #btn-detener {
      background: var(--crema-dark);
      color: var(--cafe);
      border: 1px solid rgba(92,45,14,0.2);
      display: none;
      flex: 1;
    }

    #btn-detener:hover:not(:disabled) { background: #d9c9ae; }

    #btn-pausa {
    background: transparent;
    color: var(--cafe);
    border: 1px solid rgba(92,45,14,0.3);
    font-size: 0.85rem;
    padding: 10px 18px;
    }

    #btn-pausa:hover { background: var(--crema-dark); }

    #btn-confirmar-ubicacion {
      background: var(--cafe);
      color: var(--crema);
      border-radius: 50px;
      display: none;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-family: 'Lora', serif;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btn-confirmar-ubicacion:hover { background: var(--tierra); }

    #btn-sin-ubicacion {
      background: transparent;
      color: var(--gris);
      border: 1px solid rgba(154,133,110,0.4);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 0.85rem;
      font-family: 'Lora', serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btn-sin-ubicacion:hover {
      border-color: var(--cafe-mid);
      color: var(--cafe-mid);
    }

    #btn-mapa {
      background: transparent;
      color: var(--gris);
      border: 1px solid rgba(154,133,110,0.4);
      font-size: 0.82rem;
      padding: 10px 16px;
      border-radius: 50px;
    }

    #btn-mapa:hover { border-color: var(--cafe); color: var(--cafe); }
  </style>
</head>
<body>

  <div id="header">
    <button class="header-btn">☰</button>
    <div id="header-titulo">
      Santa Fe de Antioquia
      <span>Historias de ayer y hoy</span>
    </div>
    <button class="header-btn">◎</button>
  </div>

  <div id="app">

    <div id="lado-personaje">
      <img class="pose activa" id="pose-idle"     src="img/idle.png"     alt="Don Ezequiel">
      <img class="pose"        id="pose-hablando" src="img/hablando.png" alt="Don Ezequiel hablando">
      <img class="pose"        id="pose-secreto"  src="img/secreto.png"  alt="Don Ezequiel secreto">
      <img class="pose"        id="pose-mano"     src="img/mano.png"     alt="Don Ezequiel mano">
    </div>

    <div id="lado-panel">

      <div id="dialogo"></div>
      <div id="transcripcion-wrap"></div>

      <!-- Mapa ubicación -->
      <div id="seccion-mapa">
        <p>¿Dónde ocurrió esta historia? Toca el mapa para marcar el lugar.</p>
        <div id="mapa"></div>
        <div id="botones-mapa">
          <button id="btn-confirmar-ubicacion">📍 Confirmar lugar</button>
          <button id="btn-sin-ubicacion">No sé dónde ocurrió</button>
        </div>
      </div>

      <div id="controles">
        <div id="estado-texto"></div>
        <div id="botones">
          <button class="btn" id="btn-grabar">🎙 Contar mi historia</button>
          <button class="btn" id="btn-detener">⏹ Terminar</button>
          <button class="btn" id="btn-pausa" style="display:none;">⏸ Pausar</button>
          <button class="btn" id="btn-mapa"
            onclick="window.open('/static/mapa-historias.html','_blank')">
            🗺 Ver historias
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const dialogo           = document.getElementById("dialogo");
    const estadoTexto       = document.getElementById("estado-texto");
    const btnGrabar         = document.getElementById("btn-grabar");
    const btnDetener        = document.getElementById("btn-detener");
    const btnConfirmar      = document.getElementById("btn-confirmar-ubicacion");
    const btnSinUbicacion   = document.getElementById("btn-sin-ubicacion");
    const seccionMapa       = document.getElementById("seccion-mapa");
    const transcripcionWrap = document.getElementById("transcripcion-wrap");

    const poses = {
      idle:     document.getElementById("pose-idle"),
      hablando: document.getElementById("pose-hablando"),
      secreto:  document.getElementById("pose-secreto"),
      mano:     document.getElementById("pose-mano"),
    };

    let poseActual = "idle", mediaRecorder = null, chunks = [];
    let historiaId = null, mapa = null, marcador = null;
    let coordElegida = null, audioActual = null;
    let frasesActuales = null; // guardadas para btn-sin-ubicacion

    const iconoMarcador = L.divIcon({
      className: "",
      html: `<svg width="32" height="40" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24S32 26 32 16C32 7.163 24.837 0 16 0z" fill="#5c2d0e"/>
        <circle cx="16" cy="16" r="7" fill="#f0e6d3"/>
      </svg>`,
      iconSize: [32, 40], iconAnchor: [16, 40], popupAnchor: [0, -40]
    });

    // ── Poses ────────────────────────────────────────────────────────────────
    function setPose(nombre) {
      if (poseActual === nombre) return;
      poses[poseActual].classList.remove("activa");
      (poses[nombre] || poses["idle"]).classList.add("activa");
      poseActual = nombre;
    }

    // ── Diálogo ──────────────────────────────────────────────────────────────
    function agregarBurbuja(texto, tipo = "ezequiel") {
      const div = document.createElement("div");
      div.className = `burbuja ${tipo}`;
      div.textContent = texto;
      dialogo.appendChild(div);
      dialogo.scrollTop = dialogo.scrollHeight;
      return div;
    }

    function mostrarPuntos() {
      const div = document.createElement("div");
      div.className = "puntos";
      div.id = "puntos-cargando";
      div.innerHTML = "<span></span><span></span><span></span>";
      dialogo.appendChild(div);
      dialogo.scrollTop = dialogo.scrollHeight;
    }

    function quitarPuntos() {
      const p = document.getElementById("puntos-cargando");
      if (p) p.remove();
    }

    // ── TTS ──────────────────────────────────────────────────────────────────
    async function hablar(texto, pose) {
      setPose(pose);
      try {
        const r = await fetch("/tts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ texto })
        });
        if (!r.ok) throw new Error(`TTS error ${r.status}`);
        const blob  = await r.blob();
        const url   = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio._url  = url;
        return audio;
      } catch(e) {
        console.error("Error en hablar():", e, "| texto:", texto);
        throw e;
      }
    }

    async function reproducir(audio) {
    if (audioActual) { audioActual.pause(); audioActual = null; }
    audioActual = audio;
    pausado = false;
    btnPausa.style.display = "inline-block";
    btnPausa.textContent   = "⏸ Pausar";
    audio.play();
    await new Promise(r => {
      audio.onended = () => {
        URL.revokeObjectURL(audio._url);
        btnPausa.style.display = "none";
        pausado = false;
        r();
      };
    });
    }

    // ── Narrar guión ─────────────────────────────────────────────────────────
    async function narrarGuion(guion) {
      for (const parrafo of guion.parrafos) {
        const pose = parrafo.pose === "saludo" ? "idle" : parrafo.pose;
        mostrarPuntos();
        const audio = await hablar(parrafo.texto, pose);
        quitarPuntos();
        agregarBurbuja(parrafo.texto, "ezequiel");
        await reproducir(audio);
      }
      setPose("idle");
      estadoTexto.textContent = "";
      btnGrabar.style.display = "inline-block";
    }

    // ── Despedida (reutilizable desde confirmar y sin-ubicación) ─────────────
    async function ejecutarDespedida(frases) {
      mostrarPuntos();
      const audioDespedida = await hablar(frases.despedida, "mano");
      quitarPuntos();
      agregarBurbuja(frases.despedida, "ezequiel");
      await reproducir(audioDespedida);

      setPose("idle");

      // Botón para ver el mapa
      const btnVerMapa = document.createElement("button");
      btnVerMapa.className = "btn";
      btnVerMapa.textContent = "🗺 Ver todas las historias";
      btnVerMapa.style.cssText = "background:var(--cafe);color:var(--crema);border:none;cursor:pointer;margin-top:4px;";
      btnVerMapa.onclick = () => window.open("/static/mapa-historias.html", "_blank");
      dialogo.appendChild(btnVerMapa);
      dialogo.scrollTop = dialogo.scrollHeight;

      btnGrabar.style.display = "inline-block";
    }

    // ── Arranque ─────────────────────────────────────────────────────────────
    async function arrancar() {
      // Detecta si viene con un ID específico desde el mapa
      const params     = new URLSearchParams(window.location.search);
      const idElegido  = params.get("historia");

      estadoTexto.textContent = "Don Ezequiel está recordando una historia...";
      mostrarPuntos();

      try {
        const url  = idElegido ? `/guion/${idElegido}` : "/historia-aleatoria";
        const r    = await fetch(url);
        const data = await r.json();
        quitarPuntos();
        estadoTexto.textContent = "";

        if (data.error) {
          const texto = "Buenas tardes tenga usted. Aún no tengo historias que contarle, pero puede ser el primero en compartir una.";
          agregarBurbuja(texto, "ezequiel");
          const audio = await hablar(texto, "idle");
          await reproducir(audio);
          setPose("idle");
          btnGrabar.style.display = "inline-block";
          return;
        }

        await narrarGuion(data);

      } catch(e) {
        quitarPuntos();
        agregarBurbuja("(No se pudo conectar con el servidor)", "sistema");
        estadoTexto.textContent = "";
      }
    }

    // ── Grabar ───────────────────────────────────────────────────────────────
    btnGrabar.addEventListener("click", async () => {
      chunks = [];
      seccionMapa.style.display       = "none";
      transcripcionWrap.style.display = "none";

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch(e) {
        estadoTexto.textContent = "❌ No se pudo acceder al micrófono.";
        return;
      }

      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        await procesarAudio();
      };

      mediaRecorder.start();
      setPose("idle");
      estadoTexto.textContent      = "🔴 Escuchando...";
      btnGrabar.style.display      = "none";
      btnDetener.style.display     = "inline-block";
      agregarBurbuja("(El visitante está contando una historia...)", "sistema");
    });

    // ── Detener ──────────────────────────────────────────────────────────────
    btnDetener.addEventListener("click", () => {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        estadoTexto.textContent  = "⏳ Transcribiendo...";
        btnDetener.style.display = "none";
      }
    });

    const btnPausa = document.getElementById("btn-pausa");
    let pausado = false;

    // Pausa.
    btnPausa.addEventListener("click", () => {
      if (!audioActual) return;
      if (pausado) {
        audioActual.play();
        pausado = false;
        btnPausa.textContent = "⏸ Pausar";
      } else {
        audioActual.pause();
        pausado = true;
        btnPausa.textContent = "▶ Reanudar";
      }
    });

    // ── Procesar audio ────────────────────────────────────────────────────────
    async function procesarAudio() {
      const blob = new Blob(chunks, { type: "audio/webm" });
      const fd   = new FormData();
      fd.append("audio", blob, "historia.webm");

      try {
        // 1. Transcribir
        const r1   = await fetch("/transcribir", { method: "POST", body: fd });
        const data = await r1.json();

        if (data.error) {
          estadoTexto.textContent = "❌ Error al transcribir.";
          btnGrabar.style.display = "inline-block";
          return;
        }

        historiaId = data.numero;
        transcripcionWrap.style.display = "block";
        transcripcionWrap.textContent   = data.texto;
        agregarBurbuja(data.texto, "visitante");

        estadoTexto.textContent = "Don Ezequiel está escuchando...";
        setPose("idle");
        await new Promise(r => setTimeout(r, 1200));
        estadoTexto.textContent = "";

        // 2. Don Ezequiel agradece
        const rg      = await fetch("/gracias", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ texto: data.texto })
        });
        const gracias = await rg.json();

        mostrarPuntos();
        const audioGracias = await hablar(gracias.texto, "mano");
        quitarPuntos();
        agregarBurbuja(gracias.texto, "ezequiel");
        await reproducir(audioGracias);

        // 3. Frases de transición y despedida
        const rf     = await fetch("/frases-transicion");
        const frases = await rf.json();
        frasesActuales = frases; // guardadas para btn-sin-ubicacion

        // 4. Pregunta por el lugar
        mostrarPuntos();
        const audioTransicion = await hablar(frases.transicion, "mano");
        quitarPuntos();
        agregarBurbuja(frases.transicion, "ezequiel");
        await reproducir(audioTransicion);

        // 5. Muestra el mapa
        setPose("idle");
        mostrarMapaUbicacion();

        // 6. Confirmar ubicación
        btnConfirmar.onclick = async () => {
          if (!coordElegida || !historiaId) return;
          await fetch("/ubicar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: historiaId, lat: coordElegida.lat, lng: coordElegida.lng })
          });
          seccionMapa.style.display = "none";
          agregarBurbuja("(Historia ubicada en el mapa ✓)", "sistema");
          await ejecutarDespedida(frasesActuales);
        };

      } catch(e) {
        console.error("Error completo:", e);
        estadoTexto.textContent = "❌ No se pudo conectar.";
        btnGrabar.style.display = "inline-block";
      }
    }

    // ── Mapa de ubicación ────────────────────────────────────────────────────
    function mostrarMapaUbicacion() {
      seccionMapa.style.display  = "flex";
      btnConfirmar.style.display = "none";
      coordElegida               = null;

      if (!mapa) {
        mapa = L.map("mapa").setView([6.5567, -75.8241], 15);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap"
        }).addTo(mapa);
        mapa.on("click", (e) => {
          coordElegida = { lat: e.latlng.lat, lng: e.latlng.lng };
          if (marcador) { marcador.setLatLng(e.latlng); }
          else { marcador = L.marker(e.latlng, { icon: iconoMarcador }).addTo(mapa); }
          btnConfirmar.style.display = "inline-block";
        });
      } else {
        mapa.setView([6.5567, -75.8241], 15);
        if (marcador) { mapa.removeLayer(marcador); marcador = null; }
        setTimeout(() => mapa.invalidateSize(), 100);
      }
    }

    // ── Sin ubicación ────────────────────────────────────────────────────────
    btnSinUbicacion.addEventListener("click", async () => {
      seccionMapa.style.display = "none";
      agregarBurbuja("(Historia sin ubicación definida)", "sistema");
      if (frasesActuales) await ejecutarDespedida(frasesActuales);
    });

    arrancar();
  </script>
</body>
</html>
