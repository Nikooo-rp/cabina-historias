<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Probar guión</title></head>
<body style="font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px">
  <h2>Probar generación de guión</h2>
  <textarea id="texto" rows="5" style="width:100%;font-size:1rem;padding:8px"
    placeholder="Pega aquí una historia cruda..."></textarea>
  <br><br>
  <button onclick="probar()" style="padding:10px 20px;cursor:pointer">Generar guión</button>
  <pre id="resultado" style="margin-top:20px;background:#f5f5f5;padding:16px;white-space:pre-wrap"></pre>

  <script>
    async function probar() {
      const texto = document.getElementById("texto").value;
      const resultado = document.getElementById("resultado");
      resultado.textContent = "Generando...";

      const r = await fetch("/guion", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto })
      });

      const data = await r.json();
      resultado.textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
